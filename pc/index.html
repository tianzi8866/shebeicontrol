<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCT-100 化工装置智能控制器</title>
<style>
:root{--bg:#0f1419;--card:#17202a;--border:#283340;--text:#e0e6ed;--dim:#8899a6;--green:#2ecc71;--red:#e74c3c;--blue:#3498db;--orange:#f39c12;--cyan:#1abc9c;--radius:10px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#0b1015;border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.topbar h1{font-size:18px;font-weight:700;letter-spacing:1px;}
.topbar h1 span{color:var(--green);}
.device-id-input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:4px;font-size:13px;width:140px;font-family:monospace;}
.device-id-input:focus{outline:none;border-color:var(--green);}
.conn-status{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;}
.conn-dot{width:10px;height:10px;border-radius:50%;}
.conn-dot.on{background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s infinite;}
.conn-dot.off{background:var(--red);box-shadow:0 0 8px var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.conn-text.on{color:var(--green)}.conn-text.off{color:var(--red)}
.btn{padding:6px 14px;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.5px;}
.btn-refresh{background:rgba(52,152,219,.15);color:var(--blue);border:1px solid rgba(52,152,219,.3);}
.btn-refresh:hover{background:rgba(52,152,219,.25);}
.btn-reboot{background:rgba(231,76,60,.15);color:var(--red);border:1px solid rgba(231,76,60,.3);}
.btn-reboot:hover{background:rgba(231,76,60,.25);}

.main-grid{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto 1fr;gap:14px;padding:14px;flex:1;min-height:0;overflow-y:auto;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.card-header{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.card-header .icon{font-size:16px;}
.sensor-value{text-align:center;padding:8px 0;}
.sensor-value .big{font-size:52px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;font-family:'Consolas','Monaco',monospace;}
.sensor-value .unit{font-size:16px;color:var(--dim);font-weight:400;}
.sensor-value .label{font-size:12px;color:var(--dim);margin-top:4px;}
.temp-color{color:var(--orange);}.light-color{color:var(--cyan);}
.threshold-bar{margin-top:10px;background:#1a2632;border-radius:4px;height:8px;overflow:hidden;}
.threshold-bar .fill{height:100%;border-radius:4px;transition:width .6s ease;}
.threshold-bar .fill.temp{background:linear-gradient(90deg,var(--cyan),var(--orange),var(--red));}
.threshold-bar .fill.light{background:linear-gradient(90deg,#2c3e50,var(--cyan));}
.threshold-info{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-top:4px;}

/* 继电器 */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.toggle-row:last-child{border-bottom:none;}
.toggle-left{display:flex;align-items:center;gap:12px;}
.toggle-name{font-size:15px;font-weight:700;}
.toggle-sub{font-size:11px;color:var(--dim);display:block;}
/* 灯泡 */
.bulb{position:relative;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
.bulb svg{width:32px;height:32px;}
.bulb .glow{position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(241,196,15,.3);filter:blur(8px);opacity:0;transition:opacity .4s;}
.bulb.on .glow{opacity:1;animation:glowPulse 1.5s infinite;}
.bulb.on .bulb-body{fill:#f1c40f;}
.bulb.off .bulb-body{fill:#566573;}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.3);opacity:1}}
/* 风扇 */
.fan-wrap{position:relative;width:36px;height:36px;}
.fan-wrap.on .fan-body{animation:spin .5s linear infinite;}
.fan-wrap.off .fan-body{animation:none;}
.fan-body{width:36px;height:36px;position:relative;}
.fan-blade{position:absolute;top:6px;left:15px;width:6px;height:22px;border-radius:3px;background:#566573;}
.fan-blade:nth-child(1){transform:rotate(0deg);transform-origin:3px 12px;}
.fan-blade:nth-child(2){transform:rotate(90deg);transform-origin:3px 12px;}
.fan-blade:nth-child(3){transform:rotate(180deg);transform-origin:3px 12px;}
.fan-blade:nth-child(4){transform:rotate(270deg);transform-origin:3px 12px;}
.fan-wrap.on .fan-blade{background:var(--blue);}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* 开关 — JS class 驱动 */
.toggle-switch{position:relative;width:52px;height:28px;flex-shrink:0;cursor:pointer;}
.toggle-switch input{display:none;}
.toggle-slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#2c3e50;border-radius:14px;transition:.25s;}
.toggle-slider::before{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.25s;}
.toggle-switch.on .toggle-slider{background:var(--green);}
.toggle-switch.on .toggle-slider::before{transform:translateX(24px);}

.mode-buttons{display:flex;gap:8px;}
.mode-btn{flex:1;padding:12px;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--dim);font-size:14px;font-weight:700;cursor:pointer;transition:.2s;text-align:center;}
.mode-btn:hover{border-color:#5a6a7a;}
.mode-btn.active{border-color:var(--green);color:var(--green);background:rgba(46,204,113,.08);}
.mode-btn .mode-icon{font-size:24px;display:block;margin-bottom:4px;}

.threshold-input-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.threshold-input-row:last-child{border-bottom:none;}
.threshold-input-row label{font-size:13px;font-weight:600;min-width:60px;}
.threshold-input-row input{flex:1;background:#1a2632;border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:4px;font-size:13px;font-family:monospace;}
.threshold-input-row input:focus{outline:none;border-color:var(--green);}
.threshold-input-row .unit-text{font-size:12px;color:var(--dim);min-width:30px;}
.btn-set{background:var(--green);color:#000;padding:5px 12px;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;}
.btn-set:hover{opacity:.85;}

.info-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;}
.info-badge.on{background:rgba(46,204,113,.15);color:var(--green);}
.info-badge.off{background:rgba(231,76,60,.15);color:var(--red);}

.log-area{grid-column:1/-1;background:#0b1015;border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-height:80px;overflow-y:auto;font-family:'Consolas',monospace;font-size:12px;line-height:1.7;}
.log-area .log-entry{padding:1px 0;}
.log-entry.info{color:var(--dim);}.log-entry.error{color:var(--red);}.log-entry.data{color:var(--cyan);}
.log-area::-webkit-scrollbar{width:4px;}.log-area::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
.hint{font-size:11px;color:var(--dim);margin-top:6px;text-align:center;}
/* 网络切换 */
.net-toggle{display:flex;gap:0;background:#21262d;border-radius:6px;overflow:hidden;}
.net-btn{padding:5px 14px;font-size:12px;font-weight:700;border:none;background:transparent;color:var(--dim);cursor:pointer;transition:.2s;}
.net-btn.active{background:var(--green);color:#000;}
.net-btn:hover:not(.active){color:var(--text);}
/* 网络设置面板 */
.net-panel{display:none;position:fixed;top:80px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;z-index:999;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.net-panel.show{display:block;}
.net-panel h4{font-size:13px;color:var(--dim);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;}
.net-row{display:flex;align-items:center;gap:8px;padding:6px 0;}
.net-row label{font-size:11px;color:var(--dim);min-width:50px;}
.net-row input{flex:1;background:#0d1117;border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-size:11px;font-family:monospace;}
.net-row input:focus{outline:none;border-color:var(--green);}
.net-actions{display:flex;gap:6px;margin-top:12px;}
@media(max-width:850px){.main-grid{grid-template-columns:1fr 1fr;}.sensor-value .big{font-size:38px;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>⚗ PCT-100 <span>化工装置智能控制器</span></h1>
    <input type="text" class="device-id-input" id="deviceIdInput" value="PCT_100_017">
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="net-toggle" id="netToggle">
      <button class="net-btn active" id="netExtranet" onclick="switchNet('extranet')">🌐 外网</button>
      <button class="net-btn" id="netIntranet" onclick="switchNet('intranet')">🏠 内网</button>
    </div>
    <span class="conn-status" id="mqttIndicator">
      <span class="conn-dot off"></span><span class="conn-text off">MQTT 未连接</span>
    </span>
    <button class="btn btn-refresh" onclick="refreshAll()">🔄 刷新</button>
    <button class="btn btn-reboot" onclick="rebootDevice()">⏻ 重启</button>
    <button style="background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;" onclick="toggleNetPanel()" title="网络设置">⚙</button>
  </div>
</div>

<div class="main-grid">
  <div class="card"><div class="card-header"><span class="icon">🌡️</span> 温度</div>
    <div class="sensor-value"><span class="big temp-color" id="tempValue">--.-</span><span class="unit">°C</span>
      <div class="label">阈值: <span id="tempThreshold">30.5</span>°C</div></div>
    <div class="threshold-bar"><div class="fill temp" id="tempBar" style="width:0%"></div></div>
    <div class="threshold-info"><span>0°C</span><span>50°C</span></div></div>

  <div class="card"><div class="card-header"><span class="icon">💡</span> 光照</div>
    <div class="sensor-value"><span class="big light-color" id="lightValue">---</span><span class="unit">lux</span>
      <div class="label">阈值: <span id="lightThreshold">260</span> lux</div></div>
    <div class="threshold-bar"><div class="fill light" id="lightBar" style="width:0%"></div></div>
    <div class="threshold-info"><span>0 lux</span><span>1000 lux</span></div></div>

  <div class="card"><div class="card-header"><span class="icon">🔌</span> 继电器控制</div>
    <div class="toggle-row">
      <div class="toggle-left">
        <div class="bulb off" id="bulbIcon">
          <svg viewBox="0 0 32 32"><path class="bulb-body" d="M16 2C11.6 2 8 5.6 8 10c0 2.4 1 4.6 2.6 6.2V20c0 1.1.9 2 2 2h6.8c1.1 0 2-.9 2-2v-3.8C23 14.6 24 12.4 24 10c0-4.4-3.6-8-8-8z" fill="#566573"/><rect x="13" y="22" width="6" height="2" rx="1" fill="#566573"/><rect x="14" y="24" width="4" height="2" rx="1" fill="#566573"/></svg>
          <div class="glow"></div></div>
        <div><span class="toggle-name">灯光</span><span class="toggle-sub">Relay 3</span></div></div>
      <div class="toggle-switch" id="relay3Switch" onclick="toggleRelay(3)"><input type="checkbox" id="relay3Toggle"><span class="toggle-slider"></span></div></div>
    <div class="toggle-row">
      <div class="toggle-left">
        <div class="fan-wrap off" id="fanIcon"><div class="fan-body"><div class="fan-blade"></div><div class="fan-blade"></div><div class="fan-blade"></div><div class="fan-blade"></div></div></div>
        <div><span class="toggle-name">风扇</span><span class="toggle-sub">Relay 4</span></div></div>
      <div class="toggle-switch" id="relay4Switch" onclick="toggleRelay(4)"><input type="checkbox" id="relay4Toggle"><span class="toggle-slider"></span></div></div>
    <div class="hint" style="margin-top:12px;">总闸: <span id="lockStatus" class="info-badge off">已断开</span>&nbsp;|&nbsp; 模式: <strong id="modeText2">自动</strong></div></div>

  <div class="card"><div class="card-header"><span class="icon">⚙️</span> 运行模式</div>
    <div class="mode-buttons">
      <button class="mode-btn active" id="btnAuto" onclick="setMode('auto')"><span class="mode-icon">🤖</span>自动</button>
      <button class="mode-btn" id="btnManual" onclick="setMode('manual')"><span class="mode-icon">🖐️</span>手动</button></div>
    <div class="hint">当前模式: <strong id="modeText">自动</strong><br>手动模式下可控制继电器</div></div>

  <div class="card"><div class="card-header"><span class="icon">📐</span> 阈值设置</div>
    <div class="threshold-input-row"><label>🌡️ 温度ON</label><input type="number" id="tempOnInput" value="30.5" step="0.5" min="0" max="80"><span class="unit-text">°C</span><button class="btn-set" onclick="setThreshold('temp')">设置</button></div>
    <div class="threshold-input-row"><label>💡 光照ON</label><input type="number" id="lightOnInput" value="260" step="10" min="0" max="1000"><span class="unit-text">lux</span><button class="btn-set" onclick="setThreshold('light')">设置</button></div>
    <div class="hint">OFF阈值自动设为 ON-1°C / ON+100lux</div></div>

  <div class="log-area" id="logArea"><div class="log-entry info">📡 正在连接 MQTT Broker ...</div></div>
</div>

<!-- 网络设置面板 -->
<div class="net-panel" id="netPanel">
  <h4>⚙ 网络设置 <span id="netPanelLabel">— 外网</span></h4>
  <div class="net-row"><label>IP:端口</label><input id="netBroker" placeholder="mqtt://ip:port"></div>
  <div class="net-row"><label>用户名</label><input id="netUser" placeholder="username"></div>
  <div class="net-row"><label>密码</label><input id="netPass" type="password" placeholder="password"></div>
  <div class="net-actions">
    <button class="btn-set" onclick="saveNetConfig()">💾 保存并重连</button>
    <button style="background:#333;color:#aaa;border:none;padding:5px 12px;border-radius:5px;font-size:11px;cursor:pointer;" onclick="toggleNetPanel()">关闭</button>
  </div>
</div>

<script>
(function(){
'use strict';
function $(id){return document.getElementById(id);}
function api(){return window.pctAPI||null;}
var g_autoMode=true;

function addLog(e){var a=$('logArea');if(!a)return;var d=document.createElement('div');d.className='log-entry '+(e.type||'info');d.textContent=e.msg;a.appendChild(d);a.scrollTop=a.scrollHeight;while(a.children.length>100)a.firstChild.remove();}
function safeNum(v,d){return(v!==undefined&&v!==null&&!isNaN(v))?v:d;}
function toBool(v){return v===true||v===1;}

// ★ 核心函数：统一更新开关+灯泡+风扇+checkbox
function setRelayUI(v3,v4){
    // 开关 className
    var s3=$('relay3Switch'),s4=$('relay4Switch');
    if(v3!==null){if(s3)s3.className='toggle-switch'+(v3?' on':''); var c3=$('relay3Toggle'); if(c3)c3.checked=v3;}
    if(v4!==null){if(s4)s4.className='toggle-switch'+(v4?' on':''); var c4=$('relay4Toggle'); if(c4)c4.checked=v4;}
    // 灯泡
    if(v3!==null){var bi=$('bulbIcon'); if(bi)bi.className='bulb '+(v3?'on':'off');}
    // 风扇
    if(v4!==null){var fi=$('fanIcon'); if(fi)fi.className='fan-wrap '+(v4?'on':'off');}
}

function updateUI(s){
    if(!s)return;
    var t=safeNum(s.temperature,null),l=safeNum(s.light,null);
    var tv=$('tempValue'),tb=$('tempBar'),tt=$('tempThreshold');
    if(tv)tv.textContent=t!==null?t.toFixed(1):'--.-';
    if(tb)tb.style.width=Math.min(100,Math.max(0,(t||0)/50*100))+'%';
    if(tt&&s.temp_threshold!==undefined)tt.textContent=s.temp_threshold;
    var lv=$('lightValue'),lb=$('lightBar'),lt=$('lightThreshold');
    if(lv)lv.textContent=l!==null?l:'---';
    if(lb)lb.style.width=Math.min(100,Math.max(0,(l||0)/1000*100))+'%';
    if(lt&&s.light_threshold!==undefined)lt.textContent=s.light_threshold;

    // ★ 继电器动画 → 用 toBool 确保类型
    setRelayUI(toBool(s.relay3),toBool(s.relay4));

    // 总闸
    var le=$('lockStatus');
    if(le){if(toBool(s.key1_lock)){le.textContent='已合上';le.className='info-badge on';}else{le.textContent='已断开';le.className='info-badge off';}}
    // 模式
    g_autoMode=(s.mode!=='manual');
    var ba=$('btnAuto'),bm=$('btnManual'),mt=$('modeText'),mt2=$('modeText2');
    if(s.mode==='manual'){if(bm)bm.classList.add('active');if(ba)ba.classList.remove('active');if(mt)mt.textContent='手动';if(mt2)mt2.textContent='手动';}
    else{if(ba)ba.classList.add('active');if(bm)bm.classList.remove('active');if(mt)mt.textContent='自动';if(mt2)mt2.textContent='自动';}
    var s3=$('relay3Switch'),s4=$('relay4Switch');
    if(s3){s3.style.opacity=g_autoMode?'0.4':'1';s3.style.pointerEvents=g_autoMode?'none':'auto';}
    if(s4){s4.style.opacity=g_autoMode?'0.4':'1';s4.style.pointerEvents=g_autoMode?'none':'auto';}
    var ti=$('tempOnInput'),li=$('lightOnInput');
    if(ti&&s.temp_threshold!==undefined&&document.activeElement!==ti)ti.value=s.temp_threshold;
    if(li&&s.light_threshold!==undefined&&document.activeElement!==li)li.value=s.light_threshold;
    if(s.last_update)addLog({type:'data',msg:'📊 ['+s.last_update+'] 温度='+(t!==null?t.toFixed(1):'--')+'°C 光照='+(l!==null?l:'--')+'lux 模式='+(s.mode||'--')});
}

function updateMqttStatus(c,net){
    var ind=$('mqttIndicator');if(!ind)return;
    var label=net||'';
    if(c){ind.innerHTML='<span class="conn-dot on"></span><span class="conn-text on">MQTT 已连接 ['+label+']</span>';addLog({type:'info',msg:'✅ MQTT 已连接 ['+label+']'});}
    else{ind.innerHTML='<span class="conn-dot off"></span><span class="conn-text off">MQTT 未连接</span>';addLog({type:'error',msg:'❌ MQTT 断开'});}
}

// ═══ 内网/外网切换 ═══
var g_editNet=null; // 当前正在编辑的网络
function switchNet(net){
    var a=api();if(!a)return;
    a.switchNetwork(net).then(function(r){
        if(r&&r.ok){
            $('netExtranet').className='net-btn'+(net==='extranet'?' active':'');
            $('netIntranet').className='net-btn'+(net==='intranet'?' active':'');
        }
    });
}
function toggleNetPanel(){
    var p=$('netPanel');if(!p)return;
    p.classList.toggle('show');
    if(p.classList.contains('show')) loadNetPanel();
}
function loadNetPanel(){
    var a=api();if(!a)return;
    a.getNetworkConfig().then(function(cfg){
        if(!cfg)return;
        g_editNet=cfg.current;
        $('netPanelLabel').textContent='— '+(cfg.current==='extranet'?'外网':'内网');
        var c=cfg[cfg.current];
        $('netBroker').value=c.broker||'';
        $('netUser').value=c.username||'';
        $('netPass').value=c.password||'';
    });
}
function saveNetConfig(){
    var a=api();if(!a||!g_editNet)return;
    var broker=$('netBroker').value.trim();
    var user=$('netUser').value.trim();
    var pass=$('netPass').value.trim();
    Promise.all([
        a.updateNetworkConfig(g_editNet,'broker',broker),
        a.updateNetworkConfig(g_editNet,'username',user),
        a.updateNetworkConfig(g_editNet,'password',pass)
    ]).then(function(){
        addLog({type:'info',msg:'💾 网络配置已保存，重新连接...'});
        toggleNetPanel();
    });
}

// ★ 点击开关 → 取反 + 立即更新动画 + 发MQTT
function toggleRelay(relay){
    var a=api();if(!a)return;
    if(g_autoMode){addLog({type:'error',msg:'⛔ 自动模式下禁止手动控制，请先切换到手动模式'});return;}
    var cb=$('relay'+(relay==3?3:4)+'Toggle');
    var cur=cb?cb.checked:false, nv=!cur;
    // 立即更新动画
    if(relay==3)setRelayUI(nv,null); else setRelayUI(null,nv);
    a.setRelay(relay,nv).then(function(r){if(!r||!r.ok)addLog({type:'error',msg:(r&&r.msg)||'控制失败'});}).catch(function(e){addLog({type:'error',msg:'异常: '+e.message});});
}
function setMode(mode){var a=api();if(!a)return;a.setMode(mode).then(function(r){if(r&&!r.ok)addLog({type:'error',msg:r.msg||'切换失败'});}).catch(function(e){addLog({type:'error',msg:'异常: '+e.message});});}
function setThreshold(type){var val=type==='temp'?$('tempOnInput').value:$('lightOnInput').value;var a=api();if(!a)return;a.setThreshold(type,val).then(function(r){if(r&&r.ok)addLog({type:'info',msg:'阈值已设置: '+type+'='+val});else addLog({type:'error',msg:(r&&r.msg)||'设置失败'});}).catch(function(e){addLog({type:'error',msg:'异常: '+e.message});});}
function refreshAll(){var a=api();if(a)a.refreshStatus();addLog({type:'info',msg:'🔄 手动刷新...'});}
function rebootDevice(){if(!confirm('确定要远程重启设备吗？'))return;var a=api();if(a)a.reboot();addLog({type:'error',msg:'⏻ 已发送重启命令'});}

window.addEventListener('DOMContentLoaded',function(){
    if(!window.pctAPI){document.body.innerHTML='<div style="color:#f85149;text-align:center;padding:100px;font-size:18px;">❌ preload加载失败</div>';return;}
    window.pctAPI.onDeviceStatus(updateUI);
    window.pctAPI.onMqttStatus(updateMqttStatus);
    window.pctAPI.onLog(addLog);
    window.pctAPI.onNetworkChanged(function(d){addLog({type:'info',msg:'🔀 已切换到 ['+d.config.label+'] '+d.config.broker});});
    var di=$('deviceIdInput');if(di)di.addEventListener('keydown',function(e){if(e.key==='Enter'&&api()){api().setDeviceId(di.value.trim());addLog({type:'info',msg:'已切换设备: '+di.value.trim()});}});
    setTimeout(function(){var a=api();if(a)a.getStatus().then(function(d){if(d)updateUI(d);}).catch(function(e){addLog({type:'error',msg:'获取状态失败: '+e.message});});},800);
});
window.toggleRelay=toggleRelay;window.setMode=setMode;window.setThreshold=setThreshold;
window.refreshAll=refreshAll;window.rebootDevice=rebootDevice;
window.switchNet=switchNet;window.toggleNetPanel=toggleNetPanel;window.saveNetConfig=saveNetConfig;
})();
</script>
</body>
</html>
